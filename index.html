<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16796F" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap" rel="stylesheet" />
    <title>Datable — Provider Dashboard</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #EFF4F3;
        font-family: 'DM Sans', system-ui, sans-serif;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #C5D1CC;
        border-top-color: #16796F;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loader p {
        margin-top: 16px;
        color: #52665F;
        font-size: 14px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="spinner"></div>
      <p>Loading&hellip;</p>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      function removeLoader() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() { loader.remove(); }, 300);
        }
      }
      var observer = new MutationObserver(function() {
        var appEl = document.getElementById('app');
        if (appEl && appEl.children.length > 0) {
          removeLoader();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('app') || document.body, { childList: true, subtree: true });
      setTimeout(removeLoader, 10000);
    </script>
  </body>
</html>
